<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>docx / pdf → md</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <div class="card">
      <h1>docx / pdf → md</h1>
      <p class="subtitle">Convert documents to Markdown for use with Claude</p>

      <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Drop a .docx or .pdf file here, or click to browse">
        <svg class="drop-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-label">Drop a <strong>.docx</strong> or <strong>.pdf</strong> file here</p>
        <p class="drop-hint">or click to browse</p>
        <input type="file" id="fileInput" accept=".docx,.pdf" aria-hidden="true" />
      </div>
    </div>
  </main>

  <div class="spinner-overlay" id="spinnerOverlay" aria-hidden="true">
    <div class="spinner"></div>
    <p>Converting…</p>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
